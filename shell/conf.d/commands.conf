# ==================== HELPERS ====================
_yuyu_device_name() {
    if [[ -d "/data/data/com.termux" ]]; then
        echo "📱 Termux"
    elif [[ -n "${WSL_DISTRO_NAME:-}" ]]; then
        echo "🪟 WSL"
    elif [[ "$(uname -s)" == "Darwin" ]]; then
        echo "🍎 macOS"
    else
        echo "🐧 Linux"
    fi
}

_yuyu_power_icon() {
    case "${YUYU_POWER_PROFILE:-cool}" in
        hot)  echo "🔥 HOT" ;;
        warm) echo "🌡️ WARM" ;;
        cool) echo "❄️ COOL" ;;
        *)    echo "❄️ COOL" ;;
    esac
}

_yuyu_ai_status() {
    if [[ -f ~/.yuyu-ai-config ]] && grep -q '"enabled": true' ~/.yuyu-ai-config 2>/dev/null; then
        local provider=$(grep -o '"provider": "[^"]*"' ~/.yuyu-ai-config 2>/dev/null | cut -d'"' -f4)
        echo "🤖 ${provider:-AI}"
    else
        echo "🐱 Neko"
    fi
}

_yuyu_server_status() {
    if curl -sf --max-time 1 http://127.0.0.1:8765/health >/dev/null 2>&1; then
        echo "✅ Running"
    else
        echo "❌ Stopped"
    fi
}

_yuyu_command_count() {
    compgen -A function | grep '^y' | wc -l | tr -d ' '
}

