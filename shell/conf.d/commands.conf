# ==================== VERSION ====================
yversion() {
    echo "${EMOJI_NEKO} Yuyu-Shell v${YUYU_VERSION}"
    echo "  📍 Home: ${YUYU_HOME}"
    echo "  📱 Device: $(_yuyu_device_name)"
    echo "  🔥 Profile: $(_yuyu_power_icon)"
    echo "  🧠 AI: $(_yuyu_ai_status)"
    echo "  📦 Modules: $(ls -1 ${YUYU_HOME}/modules/*.sh 2>/dev/null | wc -l)"
    echo "  🔌 Plugins: $(ls -1 ${YUYU_HOME}/plugins/*.sh 2>/dev/null | wc -l)"
    echo "  🎨 Theme: $(basename ${YUYU_HOME}/themes/*.sh 2>/dev/null | head -1)"
}

# ==================== BRAIN ====================
ybrain() {
    echo ""
    echo "╔══════════════════════════════════════════════════════════╗"
    if _yuyu_ai_is_enabled 2>/dev/null; then
        local provider=$(grep -o '"provider": "[^"]*"' ~/.yuyu-ai-config 2>/dev/null | cut -d'"' -f4)
        echo "║  🤖  AI MODE ACTIVE — ${provider:-External AI}      ║"
        echo "║  🧠  Smarter responses with cloud intelligence      ║"
        echo "║  ☁️   Requires internet                              ║"
        echo "║  🔌  Disable: yai-off                               ║"
    else
        echo "║  🐱  NEKO MODE ACTIVE — Local Intelligence          ║"
        echo "║  ⚡  Fast, private, offline                         ║"
        echo "║  🧠  Rule-based responses                           ║"
        echo "║  🤖  Enable AI: yai-setup                           ║"
    fi
    echo "╚══════════════════════════════════════════════════════════╝"
    echo ""
}

# ==================== METRICS ====================
ymetrics() {
    if [[ -f "$HOME/.yuyu-server.db" ]]; then
        echo "📊 Server Metrics (Last 7 days):"
        sqlite3 "$HOME/.yuyu-server.db" "SELECT metric_type, COUNT(*) FROM metrics GROUP BY metric_type;" 2>/dev/null || echo "No data yet"
    else
        echo "📊 No metrics available. Start server first: ystart"
    fi
}

# ==================== MEMORY ====================
ymemory() {
    echo "📊 Memory Info:"
    free -h 2>/dev/null || echo "  Run 'termux-battery-status' for Termux"
    echo ""
    echo "🔋 Node heap: ${NODE_MAX_HEAP:-512}MB"
    echo "🔋 Node options: ${NODE_OPTIONS}"
}

# ==================== TEMP ====================
ytemp() {
    local cpu=$(cat /sys/class/thermal/thermal_zone*/temp 2>/dev/null | head -1 | awk '{print $1/1000}')
    if [[ -n "$cpu" ]]; then
        echo "🌡️  CPU: ${cpu}°C"
    else
        echo "🌡️  CPU: N/A"
    fi
    
    if [[ -d "/data/data/com.termux" ]] && command -v termux-battery-status >/dev/null 2>&1; then
        local bat=$(termux-battery-status 2>/dev/null | grep -o '"temperature":[0-9]*' | cut -d: -f2 | awk '{print $1/10}')
        echo "🔋 Battery: ${bat}°C"
    elif [[ -f "/sys/class/power_supply/battery/temp" ]]; then
        local bat=$(cat /sys/class/power_supply/battery/temp 2>/dev/null | awk '{print $1/1000}')
        echo "🔋 Battery: ${bat}°C"
    else
        echo "🔋 Battery: N/A"
    fi
}

# ==================== PROFILE ====================
yprofile() {
    echo "📱 Power Profile: ${YUYU_POWER_PROFILE:-cool}"
    echo "⚙️  Node Heap: ${NODE_MAX_HEAP:-512}MB"
    echo "⚙️  Node Options: ${NODE_OPTIONS}"
    echo ""
    echo "💡 Profile auto-adjusts based on temperature:"
    echo "   ❄️  Cool  (<60°C)  → Full power (512MB heap)"
    echo "   🌡️  Warm  (60-70°C) → Reduced power (384MB heap)"
    echo "   🔥  Hot   (>70°C)  → Power saving (256MB heap)"
}

# ==================== ALIASES ====================
alias yhelp="yhelp"
alias yversion="yversion"
alias ybrain="ybrain"
alias ymetrics="ymetrics"
alias ymemory="ymemory"
alias ytemp="ytemp"
alias yprofile="yprofile"
alias yreload="source ~/.bashrc && echo '✅ Reloaded'"
alias yconfig="nano ~/.bashrc"
alias yneko='echo "😻 Nya~! Yuyu loves you! 🐱💕"'

# ==================== EXPORT ====================
yexport() {
    local target="${1:-/sdcard/Download}"
    local filename="yuyu-shell-v${YUYU_VERSION}.tar.gz"
    local fullpath="${target}/${filename}"
    
    mkdir -p "${target}" 2>/dev/null
    
    cd "${YUYU_HOME}/.." && tar -czf "${fullpath}" yuyu/ 2>/dev/null
    
    if [[ -f "${fullpath}" ]]; then
        local size=$(du -h "${fullpath}" | cut -f1)
        echo "✅ Exported to: ${fullpath} (${size})"
        echo ""
        echo "ℹ️  On another device, run: yimport ${fullpath}"
    else
        echo "❌ Export failed"
    fi
}

# ==================== IMPORT ====================
yimport() {
    local source="$1"
    
    if [[ -z "${source}" ]]; then
        echo -ne "${COLOR_CYAN}Enter path to yuyu config: ${COLOR_RESET}"
        read -r source
    fi
    
    if [[ ! -f "${source}" ]]; then
        echo "❌ File not found: ${source}"
        return 1
    fi
    
    local backup="${YUYU_HOME}.backup.$(date +%Y%m%d-%H%M%S)"
    cp -r "${YUYU_HOME}" "${backup}" 2>/dev/null
    
    tar -xzf "${source}" -C "$(dirname "${YUYU_HOME}")" 2>/dev/null
    
    if [[ $? -eq 0 ]]; then
        echo "✅ Imported successfully!"
        echo "💾 Backup saved: ${backup}"
        echo ""
        echo "Reload your shell to apply changes: source ~/.bashrc"
    else
        echo "❌ Import failed"
    fi
}

# ==================== SYNC GIST ====================
ysync_gist() {
    local gist_id="$1"
    
    if [[ -z "${gist_id}" ]]; then
        echo -ne "${COLOR_CYAN}Enter Gist ID: ${COLOR_RESET}"
        read -r gist_id
    fi
    
    local tmp="/tmp/yuyu-gist-${gist_id}.tar.gz"
    local url="https://gist.githubusercontent.com/raw/${gist_id}"
    
    echo "📡 Fetching from Gist..."
    
    if curl -sSL --max-time 30 "${url}" -o "${tmp}"; then
        if [[ -s "${tmp}" ]] && tar -tzf "${tmp}" >/dev/null 2>&1; then
            yimport "${tmp}"
            rm -f "${tmp}"
        else
            echo "❌ Invalid gist content"
        fi
    else
        echo "❌ Failed to fetch from Gist"
    fi
}

alias ysync="ysync_gist"
