# Help
y_help() {
    cat << 'HELP'
╔═══════════════════════════════════════════════════════════════════╗
║  😻 Yuyu-Shell v6.0 "The Galactic Neko"                          ║
║  Modular, Fast, Context-Aware Shell Framework                    ║
╚═══════════════════════════════════════════════════════════════════╝

🚀 CORE COMMANDS:
  yhelp                     Show this help
  yversion                  Show version info
  yprofile                  Show power profile (cool/warm/hot)
  ytemp                     Show CPU & Battery temperature

🤖 AI ASSISTANT:
  yai "question"            Ask Yuyu (AI or Neko mode)
  yai-setup                 Configure AI (OpenAI/Grok/Ollama)
  yai-off                   Disable AI, back to Neko mode

🔍 FUZZY FINDER (if fzf installed):
  yf <pattern>              Find files interactively
  yh                        Search command history
  yk                        Kill process interactively

📁 SMART NAVIGATION (if zoxide installed):
  cd <dir>                  Smart cd with zoxide
  cdi                       Interactive cd

📦 SCRIPT MANAGEMENT:
  yexport                   Export config to share
  yimport <file>            Import config from another device
  ysync-gist <id>           Sync from GitHub Gist

💡 Quick tips:
  • Device: ${YUYU_DEVICE:-unknown}
  • Power Profile: ${YUYU_POWER_PROFILE:-cool}
  • AI Mode: $([[ ${YUYU_AI_ENABLED:-0} == 1 ]] && echo "Enabled" || echo "Neko")
HELP
}

# Version info
y_version() {
    echo "${EMOJI_NEKO} Yuyu-Shell v${YUYU_VERSION}"
    echo "  📍 Home: ${YUYU_HOME}"
    echo "  📱 Device: ${YUYU_DEVICE:-unknown}"
    echo "  🔥 Profile: ${YUYU_POWER_PROFILE:-cool}"
    echo "  🤖 AI: $([[ ${YUYU_AI_ENABLED:-0} == 1 ]] && echo "Enabled" || echo "Neko Mode")"
    echo "  📦 Modules: $(ls -1 ${YUYU_HOME}/modules/*.sh 2>/dev/null | wc -l)"
    echo "  🔌 Plugins: $(ls -1 ${YUYU_HOME}/plugins/*.sh 2>/dev/null | wc -l)"
}

# Export config
y_export() {
    local target="${1:-/sdcard/Download}"
    local filename="yuyu-shell-v${YUYU_VERSION}.tar.gz"
    local fullpath="${target}/${filename}"
    
    mkdir -p "${target}" 2>/dev/null
    
    cd "${YUYU_HOME}/.." && tar -czf "${fullpath}" yuyu/ 2>/dev/null
    
    if [[ -f "${fullpath}" ]]; then
        local size=$(du -h "${fullpath}" | cut -f1)
        _neko_success "Exported to: ${fullpath} (${size})"
        echo ""
        echo "${EMOJI_INFO} On another device, run: yimport ${fullpath}"
    else
        _neko_error "Export failed"
    fi
}

# Import config
y_import() {
    local source="$1"
    
    if [[ -z "${source}" ]]; then
        echo -ne "${COLOR_CYAN}Enter path to yuyu config: ${COLOR_RESET}"
        read -r source
    fi
    
    if [[ ! -f "${source}" ]]; then
        _neko_error "File not found: ${source}"
        return 1
    fi
    
    # Backup current
    local backup="${YUYU_HOME}.backup.$(date +%Y%m%d-%H%M%S)"
    cp -r "${YUYU_HOME}" "${backup}" 2>/dev/null
    
    # Extract
    tar -xzf "${source}" -C "$(dirname "${YUYU_HOME}")" 2>/dev/null
    
    if [[ $? -eq 0 ]]; then
        _neko_success "Imported successfully!"
        echo "${EMOJI_BACKUP} Backup saved: ${backup}"
        echo ""
        echo "Reload your shell to apply changes"
    else
        _neko_error "Import failed"
    fi
}

# Sync from Gist
y_sync_gist() {
    local gist_id="$1"
    
    if [[ -z "${gist_id}" ]]; then
        echo -ne "${COLOR_CYAN}Enter Gist ID: ${COLOR_RESET}"
        read -r gist_id
    fi
    
    local tmp="/tmp/yuyu-gist-${gist_id}.tar.gz"
    local url="https://gist.githubusercontent.com/raw/${gist_id}"
    
    _neko_info "Fetching from Gist..."
    
    if curl -sSL --max-time 30 "${url}" -o "${tmp}"; then
        if [[ -s "${tmp}" ]] && tar -tzf "${tmp}" >/dev/null 2>&1; then
            y_import "${tmp}"
            rm -f "${tmp}"
        else
            _neko_error "Invalid gist content"
        fi
    else
        _neko_error "Failed to fetch from Gist"
    fi
}

# Aliases
alias yhelp="y_help"
alias yversion="y_version"
alias yexport="y_export"
alias yimport="y_import"
alias ysync-gist="y_sync_gist"
alias ysetup="y_export && echo 'Run y_import on another device'"
alias ysync="y_sync_gist"
alias ybuild-smart="y_build_smart"
