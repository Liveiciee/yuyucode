version = 1

exclude_patterns = [
  "dist/**", "build/**", "node_modules/**", "android/**", "ios/**",
  "patch/**", "public/**", "**/*.apk", "**/*.snap", "coverage/**",
  ".yuyu/**", ".tla/**", "tmp/**", "docs/.vitepress/cache/**",
  "yugit.cjs", "yuyu-bench.cjs", "bashrc-additions.sh",
]

test_patterns = [
  "**/*.test.js", "**/*.test.jsx", "**/*.test.cjs",
  "**/*.branch.test.js", "**/*.extended.test.js",
  "**/*.bench.js", "**/*.bench.cjs",
  "src/__snapshots__/**", "src/setupTest.js",
]

# ── JavaScript Analyzer ──────────────────────────────────────────
[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  environment = ["browser", "nodejs"]
  module_system = "es-modules"
  plugins = ["react"]

# ── Shell Analyzer (bashrc) ─────────────────────────────────────
[[analyzers]]
name = "shell"
enabled = true

  [analyzers.meta]
  shell = "bash"

# ── Markdown / Docs ─────────────────────────────────────────────
[[analyzers]]
name = "markdown"
enabled = true

[[analyzers]]
name = "spelling"
enabled = true

# ── Security Scan ───────────────────────────────────────────────
[[analyzers]]
name = "security"
enabled = true

# ── Test Coverage ───────────────────────────────────────────────
[[analyzers]]
name = "test-coverage"
enabled = true

# ── Global Skip Patterns ────────────────────────────────────────
[[issues]]
skip_patterns = [
  "JS-0833",  # false positive module_system
  "JS-C1002", # short variable names (loop dense)
  "JS-R1005", # cyclomatic complexity (state machine)
  "JS-0067",  # singleton (module-level state)
  "JS-0002",  # no-console (Terminal is UI)
  "JS-D007",  # function length (slash commands)
  "JS-0128",  # dangling underscore (intentional)
  "JS-0246",  # no-default-export (prefer named)
  "JS-0323",  # no-param-reassign (immutable patterns)
  "SC1091",   # not following (bashrc sourced)
  "SC2154",   # referenced but not assigned (nvm)
  "SC2086",   # double quote (bashrc intentional)
  "SC2046",   # command substitution (bashrc)
  "SC2006",   # legacy backticks (bashrc)
  "SC2164",   # cd without check (bashrc)
]

# ── File-Specific Overrides ─────────────────────────────────────
[[issues]]
match_paths = [
  "src/hooks/useAgentLoop.js",
  "src/hooks/useSlashCommands.js",
  "src/hooks/useApprovalFlow.js",
  "src/features.js",
  "yuyu-server.js",
]
skip_patterns = ["JS-R1005", "JS-0067", "JS-0002"]

[[issues]]
match_paths = ["src/hooks/useSlashCommands.js"]
skip_patterns = ["JS-D007"]

[[issues]]
match_paths = ["src/editor.bench.js", "yuyu-bench.cjs"]
skip_patterns = ["JS-C1002"]

[[issues]]
match_paths = [".bashrc", "bashrc-additions.sh"]
skip_patterns = ["SC2086", "SC2046", "SC2006", "SC2164", "SC1091", "SC2154"]
