name: 'Setup Node Env'
description: 'Setup Node.js + Cache (optimized untuk proyek kecil personal)'

inputs:
  node-version:
    description: 'Versi Node.js'
    required: true
    default: '24'

  # Opsional kalau package-lock.json tidak di root (tapi biasanya di root)
  cache-dependency-path:
    description: 'Path ke package-lock.json'
    required: false
    default: 'package-lock.json'

outputs:
  cache-hit:
    description: 'Apakah cache node_modules berhasil dipakai'
    value: ${{ steps.cache-nm.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: 🔧 Setup Node.js ${{ inputs.node-version }}
      id: setup-node
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'                     # Cache npm global (paling simpel & efektif)

    - name: 📦 Cache node_modules
      id: cache-nm
      uses: actions/cache@v4
      with:
        path: node_modules
        key: node-modules-\( {{ runner.os }}-node- \){{ inputs.node-version }}-${{ hashFiles(inputs.cache-dependency-path) }}
        restore-keys: |
          node-modules-\( {{ runner.os }}-node- \){{ inputs.node-version }}-

    - name: 📋 Debug Cache (Mudah dibaca di HP)
      shell: bash
      run: |
        echo "→ Node Version     : ${{ inputs.node-version }}"
        echo "→ npm Cache Hit    : ${{ steps.setup-node.outputs.cache-hit }}"
        echo "→ node_modules Hit : ${{ steps.cache-nm.outputs.cache-hit }}"
        echo "→ Working dir      : $(pwd)"

    - name: 📥 Install Dependencies
      if: steps.cache-nm.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "⚡ Cache miss → Install dependencies..."
        npm ci --legacy-peer-deps --prefer-offline --no-audit --no-fund

    - name: ✅ Dependencies siap dari cache
      if: steps.cache-nm.outputs.cache-hit == 'true'
      shell: bash
      run: echo "🚀 node_modules berhasil di-restore dari cache!"
