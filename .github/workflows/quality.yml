name: Quality Gate

on:
  push:
    branches: [ main ]
    paths-ignore: ['**.md']
  pull_request:
    branches: [ main ]

jobs:
  # ── SEMGREP SAST ────────────────────────────────────────────────────────────
  semgrep:
    name: SAST · Semgrep
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v5

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/react \
            --config p/secrets \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep.sarif \
            src/ || true

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── CODEQL ─────────────────────────────────────────────────────────────────
  codeql:
    name: SAST · CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

  # ── SONARCLOUD ──────────────────────────────────────────────────────────────
  sonarcloud:
    name: Quality · SonarCloud
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nm-

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Report coverage to DeepSource
        run: |
          curl -fsSL https://cli.deepsource.com/install | BINDIR=./bin sh
          ./bin/deepsource report \
            --analyzer test-coverage \
            --key javascript \
            --value-file ./coverage/lcov.info
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.javascript.lcov.reportPaths=./coverage/lcov.info
            -Dsonar.exclusions=**/*.test.js,**/*.bench.js,**/__snapshots__/**,android/**,dist/**,node_modules/**
            -Dsonar.test.inclusions=**/*.test.js
            -Dsonar.coverage.exclusions=**/*.test.js,**/*.bench.js,**/__snapshots__/**,src/setupTest.js

      - name: SonarCloud Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v2
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt

  # ── LINT ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint · ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nm-

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── TEST ────────────────────────────────────────────────────────────────────
  test:
    name: Test · Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nm-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: yuyucode-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── BENCHMARK ───────────────────────────────────────────────────────────────
  bench:
    name: Benchmark · Vitest Bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nm-

      - name: Install dependencies
        run: npm ci

      - name: Run benchmarks
        run: node yuyu-bench-ci.cjs

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v2
        with:
          tool: 'customSmallerIsBetter'
          output-file-path: .yuyu/bench-ci.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          comment-on-alert: true
          alert-threshold: '150%'
          fail-on-alert: true
