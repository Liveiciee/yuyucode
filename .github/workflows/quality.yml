name: Quality Gate

on:
  push:
    branches: [ main ]
    paths-ignore: ['**.md']
  pull_request:
    branches: [ main ]

jobs:
  # ── SEMGREP SAST ────────────────────────────────────────────────────────────
  semgrep:
    name: SAST · Semgrep
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # diperlukan untuk upload SARIF ke GitHub Security tab
      actions: read
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v5

      - name: Run Semgrep
        # --error dihapus — finding tidak block CI, tetap muncul di Security tab
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/react \
            --config p/secrets \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep.sarif \
            src/ || true

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── SONARCLOUD ──────────────────────────────────────────────────────────────
  # Setup: sonarcloud.io → import repo → tambah SONAR_TOKEN ke GitHub Secrets
  sonarcloud:
    name: Quality · SonarCloud
    runs-on: ubuntu-latest
    continue-on-error: true   # non-blocking sampai SONAR_TOKEN di-set
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Report coverage to DeepSource
        run: |
          curl -fsSL https://cli.deepsource.com/install | BINDIR=./bin sh
          ./bin/deepsource report \
            --analyzer test-coverage \
            --key javascript \
            --value-file ./coverage/lcov.info
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
