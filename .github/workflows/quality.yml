name: Quality Gate

on:
  push:
    branches: [ main ]
    paths-ignore: ['**.md']
  pull_request:
    branches: [ main ]

jobs:
  # ── SEMGREP SAST ────────────────────────────────────────────────────────────
  # Static Application Security Testing — no token needed for OSS rulesets.
  # Scans: secrets in code, XSS patterns, eval injection, prototype pollution,
  #        insecure fetch usage, hardcoded credentials, React-specific issues.
  semgrep:
    name: SAST · Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v5

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/react \
            --config p/secrets \
            --config p/owasp-top-ten \
            --error \
            --sarif \
            --output semgrep.sarif \
            src/
        # --error: exit 1 jika ada finding severity >= ERROR
        # Remove --error kalau mau non-blocking dulu

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── SONARCLOUD ──────────────────────────────────────────────────────────────
  # The Big Boss. Coverage, duplications, cognitive complexity, security
  # hotspots, maintainability rating, reliability rating.
  # Setup: https://sonarcloud.io → import repo → grab SONAR_TOKEN secret.
  sonarcloud:
    name: Quality · SonarCloud
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # SonarCloud butuh full git history untuk blame

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Config di sonar-project.properties
