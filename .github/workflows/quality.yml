name: Quality Gate

on:
  push:
    branches: [ main ]
    paths-ignore: ['**.md']
  pull_request:
    branches: [ main ]

run-name: 'Quality Gate - \( {{ github.ref_name }} ( \){{ github.event_name }})'

permissions:
  security-events: write
  contents: read
  actions: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: SAST · Semgrep
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: '24'

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/react \
            --config p/secrets \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep.sarif \
            src/ || true

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep SARIF Artifact (Debug)
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results-${{ github.sha }}
          path: semgrep.sarif
          retention-days: 14

  codeql:
    name: SAST · CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: '24'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

  sonarcloud:
    name: Quality · SonarCloud + Coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: '24'

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Report coverage to DeepSource
        run: |
          curl -fsSL https://cli.deepsource.com/install | BINDIR=./bin sh
          ./bin/deepsource report \
            --analyzer test-coverage \
            --key javascript \
            --value-file ./coverage/lcov.info
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.javascript.lcov.reportPaths=./coverage/lcov.info
            -Dsonar.exclusions=**/*.test.js,**/*.bench.js,**/__snapshots__/**,android/**,dist/**,node_modules/**
            -Dsonar.test.inclusions=**/*.test.js
            -Dsonar.coverage.exclusions=**/*.test.js,**/*.bench.js,**/__snapshots__/**,src/setupTest.js

      - name: SonarCloud Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt

  lint:
    name: Lint · ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: '24'
      - name: Run ESLint
        run: npm run lint

  test:
    name: Test · Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: '24'
      - name: Run Vitest with Coverage
        run: npm run test:ci
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: yuyucode-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
