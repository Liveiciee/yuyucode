name: Benchmark

on:
  push:
    branches: [ main ]
    paths-ignore: ['**.md']

permissions:
  contents: write
  deployments: write

jobs:
  benchmark:
    name: Performance · Vitest Bench (x86_64)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Create gh-pages branch if not exists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages 2>/dev/null && echo "gh-pages exists" || (
            git checkout --orphan gh-pages &&
            git reset --hard &&
            git commit --allow-empty -m "init: gh-pages for benchmark charts" &&
            git push origin gh-pages &&
            git checkout main
          )

      - name: Run benchmarks
        run: node yuyu-bench-ci.cjs

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: YuyuCode Benchmark (CI · Ubuntu x86_64)
          tool: customSmallerIsBetter
          output-file-path: .yuyu/bench-ci.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: '@liveiciee'
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench

      - name: Deploy custom dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Simpan dulu ke /tmp sebelum ganti branch
          cp bench-dashboard.html /tmp/bench-dashboard.html

          git fetch origin gh-pages
          git checkout gh-pages

          mkdir -p dev/bench
          cp /tmp/bench-dashboard.html dev/bench/index.html

          git add dev/bench/index.html
          git diff --cached --quiet || git commit -m "chore: update benchmark dashboard [skip ci]"
          git push origin gh-pages

          git checkout main
