name: Benchmark

on:
  push:
    branches: [ main ]
    paths-ignore: ['**.md']
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: write
  deployments: write

run-name: Benchmark - ${{ github.ref_name }}

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Performance · Vitest Bench (x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: '24'

      - name: Create gh-pages branch if not exists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages 2>/dev/null && echo "gh-pages exists" || (
            git checkout --orphan gh-pages &&
            git reset --hard &&
            git commit --allow-empty -m "init: gh-pages for benchmark charts" &&
            git push origin gh-pages &&
            git checkout main
          )

      - name: Run benchmarks
        env:
          BENCH_OUTPUT: /tmp/bench-ci.json
        run: node yuyu-bench-ci.cjs

      - name: Discard generated files before branch switch
        run: git checkout -- . && git clean -fd .yuyu/ || true

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: YuyuCode Benchmark (CI · Ubuntu x86_64)
          tool: customSmallerIsBetter
          output-file-path: /tmp/bench-ci.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: '@liveiciee'
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench

      - name: Deploy custom dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp bench-dashboard.html /tmp/bench-dashboard.html
          git fetch origin gh-pages
          git checkout gh-pages
          mkdir -p dev/bench
          cp /tmp/bench-dashboard.html dev/bench/index.html
          git add dev/bench/index.html
          git diff --cached --quiet || git commit -m "chore: update benchmark dashboard [skip ci]"
          git push origin gh-pages
          git checkout main
