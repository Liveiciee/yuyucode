  <path android:fillColor="#8b5cf6" android:pathData="M70,40 m-8,0 a8,8 0 1,0 16,0 a8,8 0 1,0 -16,0"/>
  <path android:fillColor="#7c3aed" android:pathData="M44,56 m-7,0 a7,7 0 1,0 14,0 a7,7 0 1,0 -14,0"/>
  <path android:fillColor="#7c3aed" android:pathData="M64,56 m-7,0 a7,7 0 1,0 14,0 a7,7 0 1,0 -14,0"/>
