name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npm run build
        env:
          VITE_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_OPENROUTER_API_KEY: ${{ secrets.VITE_OPENROUTER_API_KEY }}




      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      - name: Generate App Icons
        run: npm install --prefix /tmp sharp && node -e "const sharp=require('/tmp/node_modules/sharp');const svg=Buffer.from('<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 108 108\"><rect width=\"108\" height=\"108\" rx=\"16\" fill=\"#0C0915\"/><path fill=\"#e879f9\" d=\"M30,18 L54,52 L78,18 L68,18 L54,38 L40,18 Z M46,54 L62,54 L62,90 L46,90 Z\"/></svg>');const base='android/app/src/main/res';const s={'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192};Promise.all(Object.entries(s).map(([f,z])=>sharp(svg).resize(z,z).png().toFile(base+'/'+f+'/ic_launcher.png').then(()=>sharp(svg).resize(z,z).png().toFile(base+'/'+f+'/ic_launcher_round.png')))).then(()=>console.log('done')).catch(console.error);"

      - name: Add Capacitor Android
        run: |
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap sync android

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --parallel --build-cache

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/YuyuCode.apk

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: YuyuCode
          path: android/app/build/outputs/apk/debug/YuyuCode.apk
