name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npm run build
        env:
          VITE_CEREBRAS_API_KEY: ${{ secrets.VITE_CEREBRAS_API_KEY }}
          VITE_TAVILY_API_KEY: ${{ secrets.VITE_TAVILY_API_KEY }}

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Generate App Icons
        run: npm install --prefix /tmp sharp && node -e "const sharp=require('/tmp/node_modules/sharp');const svg=Buffer.from('<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 108 108\"><rect width=\"108\" height=\"108\" rx=\"16\" fill=\"#0C0915\"/><path fill=\"#e879f9\" d=\"M30,18 L54,52 L78,18 L68,18 L54,38 L40,18 Z M46,54 L62,54 L62,90 L46,90 Z\"/></svg>');const base='android/app/src/main/res';const s={'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192};Promise.all(Object.entries(s).map(([f,z])=>sharp(svg).resize(z,z).png().toFile(base+'/'+f+'/ic_launcher.png').then(()=>sharp(svg).resize(z,z).png().toFile(base+'/'+f+'/ic_launcher_round.png')))).then(()=>console.log('done')).catch(console.error);"

      - name: Add Capacitor Android
        run: |
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap copy android
          npx cap sync android

      # Auto-bump versionCode = build number, versionName = 1.0.N
      - name: Bump version
        uses: chkfung/android-version-actions@v1.2.1
        with:
          gradlePath: android/app/build.gradle
          versionCode: ${{ github.run_number }}
          versionName: 1.0.${{ github.run_number }}

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --parallel --build-cache

      # Decode keystore from secret, sign & zipalign
      - name: Sign APK
        id: sign_apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename signed APK
        run: cp "${{ steps.sign_apk.outputs.signedReleaseFile }}" android/app/build/outputs/apk/release/YuyuCode.apk

      # Keep artifact upload as backup
      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: YuyuCode-v1.0.${{ github.run_number }}
          path: android/app/build/outputs/apk/release/YuyuCode.apk

      - name: Get commit info
        id: info
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "msg=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT

      # Create GitHub Release — APK attached, downloadable dari Releases tab
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "YuyuCode v1.0.${{ github.run_number }} (${{ steps.info.outputs.date }})"
          body: |
            **${{ steps.info.outputs.msg }}**

            | | |
            |---|---|
            | Version | 1.0.${{ github.run_number }} |
            | Build | #${{ github.run_number }} |
            | Commit | ${{ github.sha }} |
            | Date | ${{ steps.info.outputs.date }} |

            ⬇️ Download **YuyuCode.apk** di bawah
          files: android/app/build/outputs/apk/release/YuyuCode.apk
          make_latest: true
