name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npm run build
        env:
          VITE_CEREBRAS_API_KEY: ${{ secrets.VITE_CEREBRAS_API_KEY }}
          VITE_TAVILY_API_KEY: ${{ secrets.VITE_TAVILY_API_KEY }}

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Generate App Icons
        run: |
          BASE=android/app/src/main/res
          for entry in mdpi,48 hdpi,72 xhdpi,96 xxhdpi,144 xxxhdpi,192; do
            FOLDER=${entry%,*}; SIZE=${entry#*,}
            convert -background none -resize ${SIZE}x${SIZE} icon.svg $BASE/mipmap-${FOLDER}/ic_launcher.png
            cp $BASE/mipmap-${FOLDER}/ic_launcher.png $BASE/mipmap-${FOLDER}/ic_launcher_round.png
          done

      - name: Add Capacitor Android
        run: |
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap copy android
          npx cap sync android

      # Auto-bump versionCode = build number, versionName = 1.0.N
      - name: Bump version
        uses: chkfung/android-version-actions@v1.2.1
        with:
          gradlePath: android/app/build.gradle
          versionCode: ${{ github.run_number }}
          versionName: 1.0.${{ github.run_number }}

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --parallel --build-cache

      # Decode keystore from secret, sign & zipalign
      - name: Sign APK
        id: sign_apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename signed APK
        run: cp "${{ steps.sign_apk.outputs.signedReleaseFile }}" android/app/build/outputs/apk/release/YuyuCode.apk

      # Keep artifact upload as backup
      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: YuyuCode-v1.0.${{ github.run_number }}
          path: android/app/build/outputs/apk/release/YuyuCode.apk

      - name: Get commit info
        id: info
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "msg=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT

      # Create GitHub Release — APK attached, downloadable dari Releases tab
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "YuyuCode v1.0.${{ github.run_number }} (${{ steps.info.outputs.date }})"
          body: |
            **${{ steps.info.outputs.msg }}**

            | | |
            |---|---|
            | Version | 1.0.${{ github.run_number }} |
            | Build | #${{ github.run_number }} |
            | Commit | ${{ github.sha }} |
            | Date | ${{ steps.info.outputs.date }} |

            ⬇️ Download **YuyuCode.apk** di bawah
          files: android/app/build/outputs/apk/release/YuyuCode.apk
          make_latest: true
