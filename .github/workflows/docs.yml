name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

run-name: Deploy Docs - {{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: '22'

      - name: Build VitePress
        run: npx vitepress build docs
        env:
          NODE_ENV: production

      - name: Merge gh-pages content (bench, etc.)
        run: |
          git fetch origin gh-pages
          git checkout origin/gh-pages -- dev/ 2>/dev/null || echo "no dev/ on gh-pages yet"
          if [ -d dev ]; then
            cp -r dev docs/.vitepress/dist/dev
            echo "✅ Merged dev/ from gh-pages"
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
