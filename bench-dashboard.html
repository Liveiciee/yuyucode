<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yuyu · performance dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0a0f;--bg2:#131108;--bg3:#1a1420;
  --pk:#ec4899;--pk2:#be185d;--pk3:#f9a8d4;
  --pkd:rgba(236,72,153,.08);--pkb:rgba(236,72,153,.16);--pkg:rgba(236,72,153,.28);
  --tx:#f5f0f8;--sc:#b8adc4;--mu:rgba(184,173,196,.32);
  --gn:#4ade80;--rd:#f87171;--yw:#fbbf24;
  --fn:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --fn-mono:'JetBrains Mono','Cascadia Code','Fira Code',ui-monospace,monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);font-size:14px;line-height:1.5;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.055) 3px,rgba(0,0,0,.055) 4px);pointer-events:none;z-index:9999}
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}
.o1{width:50vw;height:50vw;background:rgba(236,72,153,.055);right:-10%;top:10%}
.o2{width:35vw;height:35vw;background:rgba(139,92,246,.035);left:-8%;bottom:20%}
.tb{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(13,10,15,.94);backdrop-filter:blur(14px);border-bottom:1px solid rgba(236,72,153,.07)}
.tb-l{display:flex;align-items:center;gap:12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--pk);box-shadow:0 0 8px var(--pkg);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
.brand{font-size:14px;font-weight:500;letter-spacing:-0.01em}
.brand b{color:var(--pk);font-weight:600}
.meta{font-size:11px;color:var(--mu);text-align:right;line-height:1.5}
.meta a{color:var(--pk);text-decoration:none;opacity:.6}
.meta a:hover{opacity:1}
.main{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:32px 24px 0}
.filter-bar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.search{flex:1;min-width:200px;position:relative}
.search input{width:100%;background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:40px;padding:10px 16px;color:var(--tx);font-size:13px;font-family:var(--fn);outline:none;transition:border-color .2s}
.search input:focus{border-color:var(--pkb)}
.search input::placeholder{color:var(--mu)}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:32px;padding:6px 14px;font-size:12px;color:var(--sc);cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:var(--pkb);color:var(--pk3)}
.filter-btn.active{background:var(--pkb);border-color:var(--pk);color:white}
.summary-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:32px}
.stat-card{background:var(--bg2);border:1px solid rgba(255,255,255,.04);border-radius:16px;padding:16px;transition:all .2s}
.stat-card:hover{border-color:var(--pkb);transform:translateY(-1px)}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);margin-bottom:6px}
.stat-value{font-size:28px;font-weight:600;color:var(--tx);font-family:var(--fn-mono)}
.stat-trend{font-size:12px;margin-top:4px}
.section-title{display:flex;align-items:center;gap:12px;margin:32px 0 16px}
.section-title h2{font-size:18px;font-weight:500;letter-spacing:-0.01em}
.section-title .badge{background:var(--pkb);border-radius:20px;padding:2px 8px;font-size:10px;color:var(--pk3)}
.bench-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:32px}
.bench-card{background:var(--bg2);border:1px solid rgba(255,255,255,.04);border-radius:20px;padding:20px;transition:all .2s;position:relative;overflow:hidden}
.bench-card:hover{border-color:var(--pkb);transform:translateY(-2px)}
.bench-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--pk),transparent);opacity:0;transition:opacity .2s}
.bench-card:hover::before{opacity:.5}
.bench-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.bench-icon{font-size:28px;line-height:1}
.bench-name{font-size:15px;font-weight:500;color:var(--tx);flex:1}
.bench-value{font-size:24px;font-weight:600;color:var(--pk);font-family:var(--fn-mono)}
.bench-unit{font-size:11px;color:var(--mu);margin-left:4px}
.bench-desc{font-size:12px;color:var(--sc);line-height:1.5;margin-bottom:12px}
.bench-impact{display:inline-block;background:rgba(236,72,153,.12);border-radius:12px;padding:4px 10px;font-size:10px;color:var(--pk3);margin-bottom:12px}
.bench-meta{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.04)}
.bench-badge{font-size:10px;background:rgba(255,255,255,.04);padding:2px 8px;border-radius:12px;color:var(--mu)}
.bench-trend{font-size:11px}
.up{color:var(--gn)}.down{color:var(--rd)}.neutral{color:var(--mu)}
.history-section{margin-top:32px}
.history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.history-header h3{font-size:16px;font-weight:500}
.compare-toggle{display:flex;gap:8px;align-items:center}
.compare-toggle label{font-size:11px;color:var(--mu);cursor:pointer}
.compare-toggle input{cursor:pointer}
.table-wrapper{overflow-x:auto;border:1px solid rgba(255,255,255,.04);border-radius:16px;background:var(--bg2)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:12px 16px;text-align:left;color:var(--mu);font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:500;border-bottom:1px solid rgba(255,255,255,.04)}
td{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.02);color:var(--sc)}
tr:hover td{background:var(--bg3)}
.commit-hash{font-family:var(--fn-mono);color:var(--pk);opacity:.7;font-size:11px}
.value-cell{font-family:var(--fn-mono);font-weight:500;color:var(--tx)}
.diff-cell{font-size:10px;padding-left:8px}
footer{border-top:1px solid rgba(255,255,255,.04);padding:24px 24px 32px;max-width:1200px;margin:0 auto;font-size:11px;color:var(--mu);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-top:48px}
footer a{color:var(--pk);text-decoration:none}
footer a:hover{text-decoration:underline}
.spin{display:flex;align-items:center;justify-content:center;padding:80px;gap:6px}
.spin span{width:6px;height:6px;border-radius:50%;background:var(--pk);animation:blink 1s infinite}
.spin span:nth-child(2){animation-delay:.15s}.spin span:nth-child(3){animation-delay:.3s}
@keyframes blink{0%,80%,100%{opacity:.1;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}
.err{margin:40px auto;max-width:500px;text-align:center;padding:32px;border:1px solid rgba(248,113,113,.2);border-radius:20px;background:rgba(248,113,113,.04);color:var(--rd);font-size:13px}
.empty-state{text-align:center;padding:60px;color:var(--mu)}
.legend{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sc)}
.legend-dot{width:8px;height:8px;border-radius:50%}
@media(max-width:680px){.bench-grid{grid-template-columns:1fr}.main{padding:20px 16px}}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div>
<div class="tb">
  <div class="tb-l"><div class="dot"></div><div class="brand"><b>yuyu</b> · performance dashboard</div></div>
  <div class="meta" id="meta">—</div>
</div>
<div class="main" id="root"><div class="spin"><span></span><span></span><span></span></div></div>
<footer>
  <span>⚡ Every change is benchmarked automatically · Snapdragon 680 · CI x86_64</span>
  <span><a href="https://github.com/Liveiciee/yuyucode" target="_blank">github.com/Liveiciee/yuyucode</a></span>
</footer>
<script>
// ── Performance categories for non-technical users ──────────────────────────
const CATEGORIES = {
  'editor': { label: '✏️ Editor Feel', desc: 'How fast the editor responds when you type, open files, or switch tabs' },
  'preview': { label: '👁️ Live Preview', desc: 'Speed of updating the live preview when you edit HTML/CSS/JS' },
  'ai': { label: '🤖 AI Parsing', desc: 'How quickly Yuyu reads and understands AI responses' },
  'diff': { label: '🔍 Diff Review', desc: 'Speed of showing changes before applying them' },
  'map': { label: '🗺️ Project Map', desc: 'How fast Yuyu scans your codebase to understand it' },
  'stress': { label: '🔥 Stress Tests', desc: 'Extreme cases — your project will never be this big' },
  'robustness': { label: '🛡️ Edge Cases', desc: 'Handling weird inputs without crashing' },
  'default': { label: '📊 Core Engine', desc: 'Low-level performance that powers everything' }
};

const IMPACT_LEVELS = {
  high: { label: '⚡ High Impact', color: '#fbbf24', desc: 'You feel this every time you use the editor' },
  medium: { label: '📈 Medium Impact', color: '#4ade80', desc: 'Important for larger projects' },
  low: { label: '🔬 Low Impact', color: '#b8adc4', desc: 'Edge cases or stress tests only' }
};

function getCategory(name) {
  const l = name.toLowerCase();
  if(l.includes('tab') || l.includes('open') || l.includes('close') || l.includes('reorder') || l.includes('find')) return 'editor';
  if(l.includes('preview') || l.includes('srcdoc') || l.includes('build')) return 'preview';
  if(l.includes('parse') || l.includes('action') || l.includes('agent')) return 'ai';
  if(l.includes('diff')) return 'diff';
  if(l.includes('symbol') || l.includes('extract') || l.includes('compress') || l.includes('import') || l.includes('salience')) return 'map';
  if(l.includes('stress') || l.includes('5000') || l.includes('200') || l.includes('parallel')) return 'stress';
  if(l.includes('null') || l.includes('undefined') || l.includes('empty') || l.includes('malformed') || l.includes('unicode')) return 'robustness';
  return 'default';
}

function getImpact(name) {
  const l = name.toLowerCase();
  if(l.includes('single call') || l.includes('open 1 tab') || l.includes('empty tabs') || l.includes('no action')) return 'high';
  if(l.includes('realistic') || l.includes('small diff') || l.includes('html + css')) return 'high';
  if(l.includes('large') || l.includes('500 lines') || l.includes('50 tabs')) return 'medium';
  if(l.includes('stress') || l.includes('parallel') || l.includes('adversarial')) return 'low';
  return 'medium';
}

function formatValue(v, name) {
  if(v >= 1e9) return (v/1e9).toFixed(2) + 'B';
  if(v >= 1e6) return (v/1e6).toFixed(2) + 'M';
  if(v >= 1e3) return (v/1e3).toFixed(1) + 'K';
  if(v < 1 && v > 0) return (v*1000).toFixed(0) + ' ops';
  if(v < 10 && v >= 1) return v.toFixed(1);
  return Math.round(v).toString();
}

function formatTrend(change) {
  if(change === null) return '';
  const sign = change > 0 ? '+' : '';
  const cls = change > 2 ? 'up' : change < -2 ? 'down' : 'neutral';
  const icon = change > 2 ? '↑' : change < -2 ? '↓' : '→';
  return `<span class="${cls}">${icon} ${sign}${change.toFixed(1)}%</span>`;
}

function formatDescription(name) {
  const descriptions = {
    'empty tabs': 'Opening a new empty tab — should feel instant',
    'open 1 tab (Array spread)': 'Opening a file from your project',
    'close middle tab from 10': 'Closing a tab from a busy workspace',
    'find active tab from 20': 'Finding which tab you\'re currently editing',
    'js only': 'Live preview for JavaScript-only projects',
    'html + css + js': 'Full live preview with all web technologies',
    'small diff (4 lines)': 'Showing what changed in a small AI edit',
    'large diff (500 lines, many changes)': 'Showing what changed in a large AI edit',
    'no action blocks': 'Reading plain text AI responses',
    '1 action block': 'Parsing a single AI command',
    '5 action blocks': 'Parsing multiple AI commands at once',
    'small file (4 lines)': 'Scanning a small file for the project map',
    'realistic component (~50 lines)': 'Scanning a typical React component',
    'large file (10 components, ~500 lines)': 'Scanning a large file for the project map',
    'non-code file (early return)': 'Skipping non-code files efficiently',
    'null input': 'Handling missing data without crashing',
    'undefined input': 'Graceful handling of missing values'
  };
  return descriptions[name] || 'Core performance metric';
}

function getIcon(name) {
  const l = name.toLowerCase();
  if(l.includes('tab')) return '📁';
  if(l.includes('preview') || l.includes('srcdoc')) return '👁️';
  if(l.includes('diff')) return '🔍';
  if(l.includes('parse') || l.includes('action')) return '🤖';
  if(l.includes('symbol')) return '🧠';
  if(l.includes('compress')) return '🗜️';
  if(l.includes('import')) return '📦';
  if(l.includes('stress')) return '🔥';
  if(l.includes('null') || l.includes('undefined') || l.includes('empty')) return '🛡️';
  return '⚡';
}

// ── Load and render ──────────────────────────────────────────────────────────
function loadData(){
  return new Promise((ok,fail)=>{
    const s=document.createElement('script');
    s.src='./data.js?t='+Date.now();
    s.onload=()=>window.BENCHMARK_DATA?ok(window.BENCHMARK_DATA):fail(new Error('No data'));
    s.onerror=()=>fail(new Error('data.js not found — CI may not have run yet'));
    document.head.appendChild(s);
  });
}

let currentFilter = 'all';
let currentSearch = '';

function render(data){
  const raw=data.entries||{};
  const commitMap={};
  for(const runs of Object.values(raw)){
    for(const run of runs){
      const id=typeof run.commit==='object'?(run.commit.id||run.commit.hash||''):run.commit;
      if(!commitMap[id])commitMap[id]={commit:id,date:run.date,benches:[]};
      for(const b of(run.benches||[])){
        if(!commitMap[id].benches.find(x=>x.name===b.name))
          commitMap[id].benches.push(b);
      }
    }
  }
  const entries=Object.values(commitMap).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!entries.length){
    document.getElementById('root').innerHTML='<div class="err">📊 No benchmark data yet.<br><br>Push to main to trigger the first performance run.</div>';
    return;
  }

  const last=entries[entries.length-1];
  const prev=entries[entries.length-2]||null;
  const allNames=[...new Set(entries.flatMap(e=>e.benches.map(b=>b.name)))];
  
  // Filter logic
  let filteredNames = allNames;
  if(currentFilter !== 'all'){
    filteredNames = allNames.filter(name => getCategory(name) === currentFilter);
  }
  if(currentSearch){
    filteredNames = filteredNames.filter(name => name.toLowerCase().includes(currentSearch.toLowerCase()));
  }
  
  const filteredBenches = last.benches.filter(b => filteredNames.includes(b.name));
  
  // Summary stats
  const highImpact = filteredBenches.filter(b => getImpact(b.name) === 'high').length;
  const avgSpeed = filteredBenches.reduce((sum,b) => sum + b.value, 0) / filteredBenches.length;
  const fastest = filteredBenches.reduce((max,b) => b.value > max.value ? b : max, {value:0});
  
  document.getElementById('meta').innerHTML = 
    `<a href="https://github.com/Liveiciee/yuyucode/commit/${last.commit}" target="_blank">${last.commit.slice(0,7)}</a> · ${new Date(last.date).toLocaleDateString()} · ${entries.length} runs`;
  
  let html = `
    <div class="filter-bar">
      <div class="search"><input type="text" id="searchInput" placeholder="🔍 Search benchmarks..."></div>
      <div class="filters" id="filters">
        <button class="filter-btn ${currentFilter==='all'?'active':''}" data-filter="all">All</button>
        <button class="filter-btn ${currentFilter==='editor'?'active':''}" data-filter="editor">✏️ Editor</button>
        <button class="filter-btn ${currentFilter==='preview'?'active':''}" data-filter="preview">👁️ Preview</button>
        <button class="filter-btn ${currentFilter==='ai'?'active':''}" data-filter="ai">🤖 AI</button>
        <button class="filter-btn ${currentFilter==='diff'?'active':''}" data-filter="diff">🔍 Diff</button>
        <button class="filter-btn ${currentFilter==='map'?'active':''}" data-filter="map">🗺️ Map</button>
      </div>
    </div>
    
    <div class="summary-stats">
      <div class="stat-card"><div class="stat-label">🚀 Tests in view</div><div class="stat-value">${filteredBenches.length}</div></div>
      <div class="stat-card"><div class="stat-label">⚡ High-impact metrics</div><div class="stat-value">${highImpact}</div><div class="stat-trend">You feel these daily</div></div>
      <div class="stat-card"><div class="stat-label">📊 Avg ops/sec</div><div class="stat-value">${formatValue(avgSpeed, '')}</div></div>
      <div class="stat-card"><div class="stat-label">🏆 Fastest operation</div><div class="stat-value">${formatValue(fastest.value, fastest.name)}</div><div class="stat-trend">${fastest.name.slice(0,30)}</div></div>
    </div>
  `;
  
  // Group by category for display
  const grouped = {};
  for(const b of filteredBenches){
    const cat = getCategory(b.name);
    if(!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(b);
  }
  
  const order = ['editor', 'preview', 'ai', 'diff', 'map', 'stress', 'robustness', 'default'];
  for(const cat of order){
    if(!grouped[cat] || grouped[cat].length===0) continue;
    const catInfo = CATEGORIES[cat] || CATEGORIES.default;
    html += `
      <div class="section-title">
        <h2>${catInfo.label}</h2>
        <div class="badge">${grouped[cat].length} tests</div>
      </div>
      <div class="bench-grid">
    `;
    for(const b of grouped[cat]){
      const p = prev?.benches.find(x=>x.name===b.name);
      const trend = p ? ((b.value - p.value) / p.value * 100) : null;
      const impact = IMPACT_LEVELS[getImpact(b.name)] || IMPACT_LEVELS.medium;
      html += `
        <div class="bench-card">
          <div class="bench-header">
            <div class="bench-icon">${getIcon(b.name)}</div>
            <div class="bench-name">${b.name}</div>
            <div class="bench-value">${formatValue(b.value, b.name)}<span class="bench-unit">ops/sec</span></div>
          </div>
          <div class="bench-desc">${formatDescription(b.name)}</div>
          <div class="bench-impact" style="background:${impact.color}20;color:${impact.color}">${impact.label}</div>
          <div class="bench-meta">
            <div class="bench-badge">${catInfo.label}</div>
            <div class="bench-trend">${formatTrend(trend)}</div>
          </div>
        </div>
      `;
    }
    html += `</div>`;
  }
  
  // History table
  const topBenchmarks = [...filteredBenches].sort((a,b)=>b.value - a.value).slice(0,8);
  html += `
    <div class="history-section">
      <div class="history-header">
        <h3>📈 Performance History</h3>
        <div class="compare-toggle">
          <label>📊 Show top 8 fastest benchmarks</label>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Commit</th><th>Date</th>${topBenchmarks.map(b=>`<th title="${b.name}">${b.name.split(' ')[0].slice(0,10)}</th>`).join('')}</tr></thead>
          <tbody>
    `;
  for(const e of [...entries].slice(-10).reverse()){
    html += `<tr><td class="commit-hash">${e.commit.slice(0,7)}</td><td>${new Date(e.date).toLocaleDateString()}</td>`;
    for(const b of topBenchmarks){
      const val = e.benches.find(x=>x.name===b.name)?.value;
      html += `<td class="value-cell">${val ? formatValue(val, b.name) : '—'}</td>`;
    }
    html += `</tr>`;
  }
  html += `</tbody></table></div></div>`;
  
  document.getElementById('root').innerHTML = html;
  
  // Bind filters
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      render(data);
    });
  });
  document.getElementById('searchInput')?.addEventListener('input', (e) => {
    currentSearch = e.target.value;
    render(data);
  });
}

loadData().then(render).catch(e => {
  document.getElementById('root').innerHTML = `<div class="err">⚠️ Could not load benchmark data<br><small>${e.message}</small><br><br>Make sure CI has run at least once to generate data.js</div>`;
});
</script>
</body>
</html>
