sonar.projectKey=Liveiciee_yuyucode
sonar.organization=liveiciee
sonar.projectName=YuyuCode
sonar.projectVersion=4.5.8

# GitHub integration
sonar.host.url=https://sonarcloud.io
sonar.scm.provider=git
sonar.scm.revision=HEAD

# Source
sonar.sources=src
sonar.exclusions=src/**/*.test.js,src/**/*.spec.js,src/**/*.bench.js,src/__snapshots__/**,node_modules/**,android/**,dist/**,coverage/**,.yuyu/**,docs/**,tmp/**,patch/**,public/**

# Test files
sonar.tests=src
sonar.test.inclusions=src/**/*.test.js,src/**/*.spec.js
sonar.test.exclusions=src/**/*.bench.js

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/**/*.test.js,src/**/*.spec.js,src/**/*.bench.js,src/__snapshots__/**,src/setupTest.js

# Duplications
sonar.cpd.exclusions=src/**/*.test.js,src/**/*.spec.js,src/**/*.bench.js

# Language
sonar.sourceEncoding=UTF-8
sonar.javascript.file.suffixes=.js,.jsx,.cjs,.mjs

# Quality Gate thresholds
sonar.javascript.coverage.minimum=75
sonar.javascript.duplications.minimum=10
sonar.javascript.complexity.minimum=15

# ── Ignore false-positive rules ───────────────────────────────────────────────
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10

# S6582: Unsafe optional chaining — guarded with || 0 / || ''
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S6582
sonar.issue.ignore.multicriteria.e1.resourceKey=src/**

# S1154: Array operation results ignored — FP on chaining
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S1154
sonar.issue.ignore.multicriteria.e2.resourceKey=src/**

# S6671: Log injection — console.warn only in dev
sonar.issue.ignore.multicriteria.e3.ruleKey=javascript:S6671
sonar.issue.ignore.multicriteria.e3.resourceKey=yuyu-server.js,src/hooks/useDevTools.js

# S1542: Function complexity — state machine pattern
sonar.issue.ignore.multicriteria.e4.ruleKey=javascript:S1542
sonar.issue.ignore.multicriteria.e4.resourceKey=src/hooks/useAgentLoop.js

# S107: Too many parameters — command registry design
sonar.issue.ignore.multicriteria.e5.ruleKey=javascript:S107
sonar.issue.ignore.multicriteria.e5.resourceKey=src/hooks/useSlashCommands.js

# S125: Commented code — intentional debug comments
sonar.issue.ignore.multicriteria.e6.ruleKey=javascript:S125
sonar.issue.ignore.multicriteria.e6.resourceKey=src/**

# S1192: Duplicate strings — not applicable for small strings
sonar.issue.ignore.multicriteria.e7.ruleKey=javascript:S1192
sonar.issue.ignore.multicriteria.e7.resourceKey=src/**

# S1854: Unused assignments — FP for destructuring
sonar.issue.ignore.multicriteria.e8.ruleKey=javascript:S1854
sonar.issue.ignore.multicriteria.e8.resourceKey=src/**

# S1481: Unused variables — FP for _ underscore patterns
sonar.issue.ignore.multicriteria.e9.ruleKey=javascript:S1481
sonar.issue.ignore.multicriteria.e9.resourceKey=src/**

# S3504: var usage — we use const/let everywhere
sonar.issue.ignore.multicriteria.e10.ruleKey=javascript:S3504
sonar.issue.ignore.multicriteria.e10.resourceKey=src/**
